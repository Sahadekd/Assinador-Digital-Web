<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verificação de Assinatura</title>

<style>

body{
 font-family: Arial;
 background:#f4f4f4;
 text-align:center;
 margin-top:50px;
}

.container{
 background:white;
 padding:30px;
 width:500px;
 margin:auto;
 border-radius:10px;
 box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

input{
 padding:10px;
 width:80%;
 margin-bottom:10px;
}

button{
 padding:10px 20px;
 background:#007bff;
 color:white;
 border:none;
 border-radius:5px;
 cursor:pointer;
}

button:hover{
 background:#0056b3;
}

.resultado{
 margin-top:20px;
 padding:15px;
 border-radius:5px;
}

.valida{
 background:#d4edda;
 color:#155724;
}

.invalida{
 background:#f8d7da;
 color:#721c24;
}

</style>

</head>

<body>

<div class="container">

<h2>🔍 Verificar Assinatura Digital</h2>

<input id="assinaturaId" placeholder="Digite o ID da assinatura">

<br>

<button onclick="verificar()">Verificar</button>

<div id="resultado"></div>

</div>

<script>

async function verificar(){

 const id = document.getElementById("assinaturaId").value

 const res = await fetch(
  "http://localhost:3000/verify/" + id
 )

 const data = await res.json()

 const div = document.getElementById("resultado")

 if(data.status === "VALIDA"){

   div.className = "resultado valida"

 }else{

   div.className = "resultado invalida"

 }

 div.innerHTML = `
   <h3>Status: ${data.status}</h3>
   <p><b>Signatário:</b> ${data.signatario}</p>
   <p><b>Algoritmo:</b> ${data.algoritmo}</p>
   <p><b>Data:</b> ${data.data}</p>
   <p><b>Texto:</b> ${data.texto}</p>
 `

}

</script>

</body>
</html>
