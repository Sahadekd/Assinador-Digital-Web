<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Assinador Digital</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:400px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea,button{
width:100%;
padding:10px;
margin-top:10px;
}

textarea{
height:120px;
}

button{
background:#2d89ef;
color:white;
border:none;
cursor:pointer;
}

#assinaturaArea{
display:none;
}

.resultado{
margin-top:15px;
background:#eee;
padding:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Assinador Digital</h2>


<!-- LOGIN / CADASTRO -->

<div id="authArea">

<input id="nome" placeholder="Nome (para cadastro)">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">

<button onclick="login()">Entrar / Cadastrar</button>

<p id="msg"></p>

</div>


<!-- AREA DE ASSINATURA -->

<div id="assinaturaArea">

<h3>Assinar Texto</h3>

<textarea id="texto" placeholder="Digite o texto"></textarea>

<button onclick="assinar()">Assinar</button>

<div id="resultado" class="resultado"></div>

</div>

</div>


<script>

let user_id = null


// ====================
// LOGIN OU CADASTRO
// ====================

async function login(){

const nome = document.getElementById("nome").value
const email = document.getElementById("email").value
const password = document.getElementById("password").value

const res = await fetch("/auth",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

nome,
email,
password

})

})

const data = await res.json()

if(res.ok){

user_id = data.user_id

document.getElementById("authArea").style.display="none"

document.getElementById("assinaturaArea").style.display="block"

}else{

document.getElementById("msg").innerText=data.error

}

}


// ====================
// ASSINAR
// ====================

async function assinar(){

const texto = document.getElementById("texto").value

if(!texto){

alert("Digite um texto")

return

}

const res = await fetch("/sign",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

user_id,
texto

})

})

const data = await res.json()

document.getElementById("resultado").innerHTML=
`
<b>ID da assinatura:</b><br>
${data.assinatura_id}

<br><br>

<br>Copie esse ID para verificar a assinatura.</br>

<br>Adicione após verify:</br>
<br>http://localhost:3000/verify/</br>
`

}

</script>

</body>
</html>
